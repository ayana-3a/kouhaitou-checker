name: 株価更新（平日3回）

on:
  schedule:
    # JST 9:48 (寄り付き後) = UTC 0:48 / JST 12:23 (昼休み) = UTC 3:23 / JST 16:23 (大引け後) = UTC 7:23、月〜金
    # ※GitHubのcronは混雑時に数時間遅延するため、混みやすい毎時00分・15分を避けている
    - cron: "48 0 * * 1-5"
    - cron: "23 3 * * 1-5"
    - cron: "23 7 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ライブラリをインストール
        run: pip install yfinance pandas

      - name: 株価を一括更新
        run: python screener/update_prices.py

      - name: 結果をコミット
        run: |
          git config user.name "price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "株価更新 $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M')"
          git push
