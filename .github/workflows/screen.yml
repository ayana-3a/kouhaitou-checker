name: 週次スクリーニング更新

on:
  schedule:
    # 毎週土曜 朝6時(JST) = 金曜21時(UTC)
    - cron: "0 21 * * 5"
  workflow_dispatch: {}   # 手動実行も可能

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ライブラリをインストール
        run: pip install yfinance pandas requests xlrd openpyxl

      - name: 取得キャッシュを復元
        uses: actions/cache@v4
        with:
          path: screener/cache
          key: screener-cache-${{ github.run_id }}
          restore-keys: screener-cache-

      - name: スクリーニング実行（プライム+スタンダード・利回り3%で足切り）
        run: python screener/screen.py --prime --standard --model-pf --funds --min-yield 3.0

      - name: EDINET 10年データ付加（発掘候補+モデルPF）
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: python screener/edinet_enrich.py

      - name: 結果をコミット
        run: |
          git config user.name "screener-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "データ更新 $(TZ=Asia/Tokyo date +'%Y-%m-%d')"
          git push
